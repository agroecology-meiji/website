<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | Agroecology Lab</title>
  <meta name="description" content="最新情報" />
  <link rel="stylesheet" href="/website/assets/css/style.css" />
  <meta name="format-detection" content="telephone=no,email=no,address=no">
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <h1 class="page-title">News</h1>
    <p class="page-lead">学会発表・受賞・論文掲載などの最新情報</p>

    <!-- News item -->
    <section class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div>
          <span class="tag">Conference</span>
          <h2 style="margin:10px 0 6px;font-size:18px;">
            〇〇学会で発表しました。
          </h2>
        </div>
        <div class="muted">2026-03-02</div>
      </div>
      <p class="muted" style="margin:0;">
        学会名・発表タイトル・発表者
      </p>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div>
          <span class="tag">Publication</span>
          <h2 style="margin:10px 0 6px;font-size:18px;">
            論文が Journal of XXXX に掲載されました。
          </h2>
        </div>
        <div class="muted">2026-02-15</div>
      </div>
      <p class="muted" style="margin:0;">
        著者名、概要
      </p>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;">
        <div>
          <span class="tag">Award</span>
          <h2 style="margin:10px 0 6px;font-size:18px;">
            学生が〇〇賞を受賞しました。
          </h2>
        </div>
        <div class="muted">2026-01-20</div>
      </div>
      <p class="muted" style="margin:0;">
        受賞内容
      </p>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="/website/assets/js/include.js" defer></script>
</body>
</html>
