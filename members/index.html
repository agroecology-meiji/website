<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Members | Agroecology Lab</title>
  <meta name="description" content="アグロエコロジー研究室のメンバーを紹介します。" />
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <link rel="stylesheet" href="/website/assets/css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <section class="page-hero reveal">
      <div>
        <p class="kicker">Members</p>
        <h1 class="page-title">Members</h1>
        <p class="page-lead">教員・学生メンバー（2026年度）</p>
      </div>
      <div class="page-visual">
        <img src="/website/assets/img/260511.jpg" alt="圃場での活動風景">
        <div class="page-visual__label">Lab members</div>
      </div>
    </section>

    <section class="section reveal">
      <div class="section-head">
        <div>
          <h2 class="section-title">教員</h2>
        </div>
      </div>
      <section class="card faculty-card">
        <div class="faculty-photo-wrap">
          <img class="faculty-photo" src="/website/assets/img/koizumi.jpg" alt="小泉敬彦の顔写真">
        </div>
        <div class="faculty-profile">
          <span class="tag">専任講師</span>
          <h3 class="member-name">小泉 敬彦</h3>
          <div class="member-en">KOIZUMI Takahiko</div>
          <p class="card-text">研究分野：生態学／菌類学／環境学</p>
          <p class="member-link"><a class="btn btn--small" href="https://researchmap.jp/7000029543" target="_blank" rel="noopener noreferrer">researchmap</a></p>
        </div>
      </section>
    </section>

    <section class="section reveal">
      <div class="section-head">
        <div>
          <h2 class="section-title">学部生</h2>
        </div>
      </div>
      <div class="grid grid-3">
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">天沼</h3>
          <div class="member-en">AMANUMA A.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">飯田</h3>
          <div class="member-en">IIDA S.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">乾</h3>
          <div class="member-en">INUI R.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">石橋</h3>
          <div class="member-en">ISHIBASHI S.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">勝野</h3>
          <div class="member-en">KATSUNO K.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">木村</h3>
          <div class="member-en">KIMURA M.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">小倉</h3>
          <div class="member-en">OGURA T.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">杉山</h3>
          <div class="member-en">SUGIYAMA M.</div>
        </section>
        <section class="card student-card">
          <span class="tag">B3</span>
          <h3 class="member-name">山田</h3>
          <div class="member-en">YAMADA E.</div>
        </section>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="/website/assets/js/include.js" defer></script>
</body>
</html>
